<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e113a" />
      <stop offset="50%" stop-color="#05020c" />
      <stop offset="100%" stop-color="#020105" />
    </radialGradient>
    
    <!-- Neon Ring Gradient -->
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" /> <!-- violet-500 -->
      <stop offset="50%" stop-color="#ec4899" /> <!-- pink-500 -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- cyan-500 -->
    </linearGradient>

    <!-- Wave/Letter Z Gradient -->
    <linearGradient id="wave-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Circle Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-grad)" stroke="url(#neon-grad)" stroke-width="8" filter="url(#glow)" />

  <!-- Outer Pulse Ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#a855f7" stroke-width="2" stroke-dasharray="10, 15" opacity="0.6" />

  <!-- Futuristic 'Z' / Wave Icon -->
  <g transform="translate(156, 126)">
    <!-- Main Styled Wave forming 'Z' -->
    <path d="M 30,30 L 170,30 L 30,230 L 170,230" 
          fill="none" 
          stroke="url(#wave-grad)" 
          stroke-width="32" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          filter="url(#glow)" />
    
    <!-- Central Accent Node representing AI Voice -->
    <circle cx="100" cy="130" r="16" fill="#06b6d4" filter="url(#glow)" />
    
    <!-- Soundwaves around Z -->
    <path d="M -10,130 A 40,40 0 0,1 -10,70" fill="none" stroke="#ec4899" stroke-width="8" stroke-linecap="round" opacity="0.8" />
    <path d="M 210,130 A 40,40 0 0,0 210,190" fill="none" stroke="#a855f7" stroke-width="8" stroke-linecap="round" opacity="0.8" />
  </g>
</svg>
